name: path_manager
description: Plugin for getting commonly used locations on host file system via FFI
homepage: https://github.com/maranix/path_manager
repository: https://github.com/maranix/path_manager
issues: https://github.com/maranix/path_manager/issues
version: 0.5.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  jni: ^1.0.0
  jni_flutter: ^1.0.1
  logging: ^1.3.0
  objective_c: ^9.3.0
  ffi: ^2.1.4

dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  jnigen: ^0.16.0
  test: ^1.28.0

flutter:
  plugin:
    implements: path_manager
    platforms:
      android:
        dartPluginClass: AndroidPathManager
      ios:
        dartPluginClass: FoundationPathManager
      macos:
        dartPluginClass: FoundationPathManager

topics:
  - files
  - path-provider
  - paths
  - path-manager
  - device-directory
